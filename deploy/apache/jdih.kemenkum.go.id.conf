# ILDIS production Apache vhost — Yii2 practical template
# DocumentRoot: /mnt/data/ildis (frontend at /, admin at /backend/)
#
# Install:
#   sudo cp deploy/apache/jdih.kemenkum.go.id.conf /etc/apache2/sites-available/
#   sudo a2enmod ssl headers rewrite proxy proxy_fcgi setenvif
#   sudo a2ensite jdih.kemenkum.go.id.conf
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# Recommended global hardening in /etc/apache2/conf-available/security.conf:
#   ServerTokens Prod
#   ServerSignature Off
#   TraceEnable Off
#
# SSLSessionCache / SSLStaplingCache must live in server config, not VirtualHost.
# Ubuntu usually sets these in /etc/apache2/mods-available/ssl.conf already.
# If missing, add there (then: sudo a2enmod ssl && sudo systemctl reload apache2):
#   SSLSessionCache shmcb:${APACHE_RUN_DIR}/ssl_scache(512000)
#   SSLSessionCacheTimeout 300
#   SSLStaplingCache shmcb:${APACHE_RUN_DIR}/ssl_stapling(32768)

# =========================
# HTTP (redirect to HTTPS)
# =========================
<VirtualHost *:80>
    ServerName jdih.kemenkum.go.id
    ServerAlias www.jdih.kemenkum.go.id

    RewriteEngine On
    RewriteRule ^ https://jdih.kemenkum.go.id%{REQUEST_URI} [R=301,L,NE]

    ErrorLog ${APACHE_LOG_DIR}/jdih-kemenkum-error.log
    CustomLog ${APACHE_LOG_DIR}/jdih-kemenkum-access.log combined
</VirtualHost>

# =========================
# HTTPS (main service)
# =========================
<VirtualHost *:443>
    ServerName jdih.kemenkum.go.id
    ServerAlias www.jdih.kemenkum.go.id

    DocumentRoot /mnt/data/ildis
    DirectoryIndex index.php

    # Canonical host: drop www
    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^www\.jdih\.kemenkum\.go\.id$ [NC]
    RewriteRule ^ https://jdih.kemenkum.go.id%{REQUEST_URI} [R=301,L,NE]

    # Backend expects trailing slash (matches docker/nginx/default.conf)
    RedirectMatch 301 ^/backend$ /backend/

    # --- Directory baseline ---
    <Directory /mnt/data/ildis>
        Options -Indexes -MultiViews +FollowSymLinks
        AllowOverride All
        Require all granted

        <LimitExcept GET POST HEAD>
            Require all denied
        </LimitExcept>
    </Directory>

    # --- Block application internals (not web-facing) ---
    <DirectoryMatch "^/mnt/data/ildis/(common|console|vendor|environments|backups|node_modules|schema|DATABASE|scripts|docker|vagrant|tests|\.git|\.github|\.devcontainer|\.idea|\.superpowers|\.agents|\.vscode)(/|$)">
        Require all denied
    </DirectoryMatch>

    <DirectoryMatch "^/mnt/data/ildis/(frontend|backend)/runtime(/|$)">
        Require all denied
    </DirectoryMatch>

    <DirectoryMatch "^/mnt/data/ildis/(frontend|backend|common)/config(/|$)">
        Require all denied
    </DirectoryMatch>

    # Legacy proxy script — not a Yii entry point
    <Directory /mnt/data/ildis/berita>
        Require all denied
    </Directory>

    # --- Block dotfiles and sensitive root files ---
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    <FilesMatch "(^|/)\.(env|git|gitignore|htpasswd)$">
        Require all denied
    </FilesMatch>

    <FilesMatch "\.(bak|bat|config|sql|fla|md|psd|ini|log|sh|inc|swp|dist)$">
        Require all denied
    </FilesMatch>

    <FilesMatch "^(yii|yii_test|requirements\.php|index-test\.php|composer\.(json|lock))$">
        Require all denied
    </FilesMatch>

    # --- PHP-FPM: deny all PHP, allow only Yii entry points ---
    <FilesMatch "\.php$">
        Require all denied
    </FilesMatch>

    <LocationMatch "^/(index\.php|backend/index\.php)$">
        Require all granted
        SetHandler "proxy:unix:/run/php/php8.3-fpm.sock|fcgi://localhost/"
    </LocationMatch>

    <IfModule mod_proxy_fcgi.c>
        <Proxy "unix:/run/php/php8.3-fpm.sock|fcgi://localhost">
            ProxySet connectiontimeout=5 timeout=300
        </Proxy>
    </IfModule>

    # Yii / PHP must see HTTPS when terminated at Apache
    <IfModule mod_setenvif.c>
        SetEnvIfExpr "'%{REQUEST_SCHEME}' == 'https'" HTTPS=on
    </IfModule>
    <IfModule mod_headers.c>
        RequestHeader set X-Forwarded-Proto "https" env=HTTPS
    </IfModule>

    # --- TLS ---
    SSLEngine on
    SSLCertificateFile /etc/ssl/kemenkum2026.crt
    SSLCertificateKeyFile /etc/ssl/private/kemenkum2026.key
    # Uncomment when chain/bundle is available on disk:
    # SSLCertificateChainFile /etc/ssl/certs/kemenkum2026.ca-bundle

    SSLProtocol -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305
    SSLHonorCipherOrder on

    # Enable after SSLCertificateChainFile is configured (requires SSLStaplingCache in ssl.conf):
    # SSLUseStapling on

    # --- Security headers (aligned with docker/nginx/default.conf) ---
    <IfModule mod_headers.c>
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set X-XSS-Protection "1; mode=block"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        Header always set Permissions-Policy "geolocation=(self)"
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
        Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' http://cdn.jsdelivr.net https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com http://cdn.jsdelivr.net https://cdn.jsdelivr.net; img-src 'self' data: https:; font-src 'self' https: data: https://fonts.gstatic.com; object-src 'none'; frame-ancestors 'self'"

        Header always unset X-Powered-By
    </IfModule>

    # Upload limit (adjust if larger documents are expected)
    LimitRequestBody 52428800

    ErrorLog ${APACHE_LOG_DIR}/jdih-kemenkum-error.log
    CustomLog ${APACHE_LOG_DIR}/jdih-kemenkum-access.log combined
</VirtualHost>
