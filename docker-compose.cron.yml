version: "3.8"

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ildis_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_DATABASE:-ildis_v4}
      POSTGRES_USER: ${DB_USER:-ildis}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ildis2024}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${DB_USER:-ildis}"]
      interval: 10s
      timeout: 5s
      retries: 5


  app:
    build:
      context: .
      dockerfile: Dockerfile

    depends_on:
      postgres:
        condition: service_healthy


    ports:
      - "8080:80"


    volumes:
      - runtime:/var/www/runtime
      - backend-assets:/var/www/backend/web/assets
      - frontend-assets:/var/www/frontend/web/assets
      - backend-uploads:/var/www/backend/web/uploads
      - frontend-uploads:/var/www/frontend/web/uploads
      - ./docker/nginx/default.conf:/etc/nginx/http.d/default.conf:ro
      - ./.env:/var/www/.env:ro
      - feed_data:/var/www/feed


    environment:

      - YII_ENV=${YII_ENV:-prod}

      - YII_DEBUG=${YII_DEBUG:-false}

      - DB_HOST=${DB_HOST:-postgres}

      - DB_USER=${DB_USER:-ildis}

      - DB_PASSWORD=${DB_PASSWORD:-ildis2024}

      - DB_DATABASE=${DB_DATABASE:-ildis_v4}

      - DB_DATABASE_PORT=${DB_DATABASE_PORT:-5432}


    restart: unless-stopped


  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron

    depends_on:
      postgres:
        condition: service_healthy


    volumes:
      - feed_data:/var/www/feed


    environment:

      - YII_ENV=${YII_ENV:-prod}

      - YII_DEBUG=${YII_DEBUG:-false}

      - DB_HOST=${DB_HOST:-postgres}

      - DB_USER=${DB_USER:-ildis}

      - DB_PASSWORD=${DB_PASSWORD:-ildis2024}

      - DB_DATABASE=${DB_DATABASE:-ildis_v4}

      - DB_DATABASE_PORT=${DB_DATABASE_PORT:-5432}


    restart: unless-stopped


volumes:

  postgres_data:

  runtime:

  backend-assets:

  frontend-assets:

  backend-uploads:

  frontend-uploads:

  feed_data: